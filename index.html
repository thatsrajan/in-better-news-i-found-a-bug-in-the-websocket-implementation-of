<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Payload Inspector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <section class="card hero">
      <div>
        <p class="eyebrow">OpenAI realtime debug aid</p>
        <h1>Catch missing phase fields before the model stalls</h1>
        <p>Paste an outbound payload, inspect for required realtime fields, and generate a patched version.</p>
      </div>
      <button id="demo">Load sample payload</button>
    </section>
    <section class="grid two-up">
      <article class="card stack">
        <h2>Outbound payload</h2>
        <textarea id="payload" rows="18" placeholder='{"type":"response.create","response":{"modalities":["text"]}}'></textarea>
        <button id="inspect">Inspect payload</button>
      </article>
      <article class="card stack">
        <h2>Inspection</h2>
        <div id="summary" class="summary"></div>
        <pre id="patched"></pre>
      </article>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
